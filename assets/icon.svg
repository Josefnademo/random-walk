<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="112" fill="#080a0f"/>
  <!-- Decorative grid -->
  <g opacity="0.07" stroke="#c7ff55" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Route path -->
  <g filter="url(#glow)">
    <polyline
      points="120,340 160,220 260,180 340,280 380,180"
      fill="none"
      stroke="url(#grad)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
  <!-- Start dot -->
  <circle cx="120" cy="340" r="18" fill="#c7ff55"/>
  <circle cx="120" cy="340" r="10" fill="#080a0f"/>
  <!-- End dot -->
  <circle cx="380" cy="180" r="14" fill="#60b8ff" opacity="0.9"/>
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c7ff55"/>
      <stop offset="0.5" stop-color="#60b8ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
