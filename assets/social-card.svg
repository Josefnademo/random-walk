<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080a0f"/>
  <!-- Gradient orbs -->
  <circle cx="150" cy="150" r="380" fill="#c7ff55" opacity="0.08"/>
  <circle cx="1100" cy="520" r="420" fill="#60b8ff" opacity="0.07"/>
  <!-- Grid lines -->
  <g stroke="#ffffff" opacity="0.03" stroke-width="1">
    <line x1="0"   y1="90"  x2="1200" y2="90"/>
    <line x1="0"   y1="180" x2="1200" y2="180"/>
    <line x1="0"   y1="270" x2="1200" y2="270"/>
    <line x1="0"   y1="360" x2="1200" y2="360"/>
    <line x1="0"   y1="450" x2="1200" y2="450"/>
    <line x1="0"   y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0"   x2="150"  y2="630"/>
    <line x1="300" y1="0"   x2="300"  y2="630"/>
    <line x1="450" y1="0"   x2="450"  y2="630"/>
    <line x1="600" y1="0"   x2="600"  y2="630"/>
    <line x1="750" y1="0"   x2="750"  y2="630"/>
    <line x1="900" y1="0"   x2="900"  y2="630"/>
    <line x1="1050" y1="0"  x2="1050" y2="630"/>
  </g>
  <!-- Route illustration -->
  <g filter="url(#glow)">
    <polyline
      points="800,490 860,340 960,290 1040,380 1100,260"
      fill="none"
      stroke="url(#grad)"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
  <circle cx="800" cy="490" r="12" fill="#c7ff55"/>
  <circle cx="800" cy="490" r="7"  fill="#080a0f"/>
  <circle cx="1100" cy="260" r="9" fill="#60b8ff" opacity="0.9"/>
  <!-- Brand mark -->
  <circle cx="68" cy="68" r="10" fill="#c7ff55" opacity="0.9"/>
  <text x="92" y="76" fill="#c7ff55" font-family="system-ui,sans-serif" font-size="22" font-weight="900" letter-spacing="6">RANDOM/WALK</text>
  <!-- Main heading -->
  <text x="68" y="330" fill="#eef0f6" font-family="system-ui,sans-serif" font-size="96" font-weight="900" letter-spacing="-5">Stop deciding.</text>
  <text x="68" y="440" fill="#eef0f6" font-family="system-ui,sans-serif" font-size="96" font-weight="900" letter-spacing="-5">Start walking.</text>
  <!-- Tagline -->
  <text x="68" y="508" fill="#7a8399" font-family="system-ui,sans-serif" font-size="30" font-weight="500">Free spontaneous walking routes · XP · Challenges</text>
  <!-- URL -->
  <text x="68" y="588" fill="#c7ff55" font-family="system-ui,sans-serif" font-size="22" font-weight="600" opacity="0.7">josefnademo.github.io/random-walk</text>
  <!-- Defs -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#c7ff55"/>
      <stop offset="0.5" stop-color="#60b8ff"/>
      <stop offset="1"   stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
